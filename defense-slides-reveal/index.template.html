<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>PhD Defense</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Reveal.js core CSS -->
  <link rel="stylesheet" href="node_modules/reveal.js/dist/reveal.css">

  <!-- Reveal.js theme -->
  <link rel="stylesheet" href="node_modules/reveal.js/dist/theme/white.css">

  <!-- Code highlighting, optional but useful later -->
  <link rel="stylesheet" href="node_modules/reveal.js/plugin/highlight/monokai.css">

  <!-- Your custom CSS -->
  <link rel="stylesheet" href="css/slides.css">
</head>

<body>
  <div class="reveal">
    <div class="section-banner" id="section-banner" aria-hidden="true">
      <div class="section-banner-inner">
        <p id="banner-section">Section</p>
        <h2 id="banner-title">Slide title</h2>
      </div>
    </div>

    <div class="slides">
	    {{SLIDES}}
    </div>

    <div class="slide-footer" id="slide-footer" aria-hidden="true">
      <div class="slide-footer-title">
        <span id="footer-section">Section</span>
        <span class="footer-separator">/</span>
        <span id="footer-title">Slide title</span>
      </div>
    
      <div class="slide-footer-nav" aria-hidden="false">
        <button class="footer-arrow footer-arrow-prev" id="footer-prev" type="button" aria-label="Previous slide">
          ‹
        </button>
        
	<input
          class="slide-footer-number"
          id="footer-slide-number"
          type="text"
          inputmode="numeric"
          aria-label="Go to slide number"
          value="01"
        />
    
        <button class="footer-arrow footer-arrow-next" id="footer-next" type="button" aria-label="Next slide">
          ›
        </button>
      </div>
    </div>

  </div>

  <!-- Reveal.js scripts -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
