name: Deploy defense slides

on:
  push:
    branches:
      - main
    paths:
      - "defense-slides-reveal/**"
      - ".github/workflows/deploy-slides.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: defense-slides-reveal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: defense-slides-reveal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build slides
        run: npm run build

      - name: Upload debug dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: defense-slides-dist-debug
          path: defense-slides-reveal/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: defense-slides-reveal/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
